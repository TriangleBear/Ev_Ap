name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install VC++ redistributable
        run: |
          curl.exe -sL -o vc_redist.x64.exe "https://aka.ms/vs/17/release/vc_redist.x64.exe"
          .\vc_redist.x64.exe /quiet /norestart

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller pytest

      - name: Run tests
        id: tests
        continue-on-error: true
        working-directory: App
        run: pytest TEST/ --junitxml=test-results.xml

      - name: Create issue on test failure
        if: steps.tests.outcome == 'failure'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const results = fs.readFileSync('App/test-results.xml', 'utf8').substring(0, 10000);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Build aborted — tests failed on main (${context.sha.substring(0,7)})`,
              body: `## Test Failure Report\n\nTests failed after merge to \`main\`.\n\n**Commit:** \`${context.sha}\`\n**Date:** ${new Date().toISOString()}\n\n<details><summary>JUnit output</summary>\n\n\`\`\`\n${results}\n\`\`\`\n\n</details>\n\n_Triggered by commit ${context.sha}_`
            });

      - name: Fail if tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1

      - name: Determine version & release notes
        id: version
        shell: pwsh
        run: |
          $mergeMsg = git log -1 --format='%s'
          $raw = python scripts/ci_build.py "$mergeMsg"
          if (-not $?) { exit 1 }
          if ($raw -is [array]) { $output = $raw -join "`n" } else { $output = "$raw" }
          $lines = $output -split "`n"
          $version = $lines[0]
          $marker = "---RELEASE NOTES---"
          $idx = $output.IndexOf($marker)
          if ($idx -ge 0) {
            $notes = $output.Substring($idx + $marker.Length).Trim()
          } else {
            $notes = $output
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "RELEASE_NOTES<<EOF" >> $env:GITHUB_ENV
          echo "$notes" >> $env:GITHUB_ENV
          echo "EOF" >> $env:GITHUB_ENV
          echo "New version: $version"

      - name: Build with PyInstaller
        id: build
        shell: pwsh
        working-directory: App
        run: |
          $verDash = "${{ steps.version.outputs.version }}".Replace('.', '-').TrimStart('v-')
          $specName = "Attendance_App_$verDash"
          pyinstaller --onedir --name "$specName" `
            --hidden-import "customtkinter" --hidden-import "CTkMessagebox" `
            --hidden-import "CTkTable" --hidden-import "pandas" --hidden-import "PIL" `
            --hidden-import "requests" --hidden-import "icecream" --hidden-import "darkdetect" `
            --hidden-import "numpy" --hidden-import "packaging" --hidden-import "Pygments" `
            --hidden-import "asttokens" --hidden-import "colorama" --hidden-import "executing" `
            --hidden-import "six" --hidden-import "tzdata" --hidden-import "database" `
            --hidden-import "managers" --hidden-import "views" --hidden-import "theme" `
            --add-data "assets/icons;assets/icons" `
            --noconsole main.py
          echo "specName=$specName" >> $env:GITHUB_OUTPUT

      - name: Commit version bump and tag
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add App/views/about_view.py
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
          git tag "${{ steps.version.outputs.version }}"
          git push origin main
          git push origin "${{ steps.version.outputs.version }}"

      - name: Create Release
        uses: ncipollo/release-action@v1.21.0
        with:
          tag: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          body: ${{ env.RELEASE_NOTES }}
          artifacts: "App/dist/${{ steps.build.outputs.specName }}/${{ steps.build.outputs.specName }}.exe"
          token: ${{ secrets.GITHUB_TOKEN }}
