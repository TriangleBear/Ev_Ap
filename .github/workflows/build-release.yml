name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller pytest

      - name: Run tests
        id: tests
        continue-on-error: true
        working-directory: App
        run: pytest TEST/ --junitxml=test-results.xml

      - name: Create issue on test failure
        if: steps.tests.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = fs.readFileSync('App/test-results.xml', 'utf8').substring(0, 10000);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Build aborted — tests failed on main`,
              body: `## Test Failure Report\n\nTests failed after merge to \`main\`.\n\n<details><summary>JUnit output</summary>\n\n\`\`\`\n${results}\n\`\`\`\n\n</details>\n\n_Triggered by commit ${context.sha}_`
            });

      - name: Fail if tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1

      - name: Determine version & release notes
        id: version
        shell: pwsh
        run: |
          $mergeMsg = git log -1 --format='%s'
          $output = python scripts/ci_build.py "$mergeMsg"
          $lines = $output -split "`n"
          $version = $lines[0]
          $idx = $output.IndexOf("---RELEASE NOTES---")
          $notes = $output.Substring($idx + "---RELEASE NOTES---".Length).Trim()
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "RELEASE_NOTES<<EOF" >> $env:GITHUB_ENV
          echo "$notes" >> $env:GITHUB_ENV
          echo "EOF" >> $env:GITHUB_ENV
          echo "New version: $version"

      - name: Generate spec and build
        id: build
        shell: pwsh
        run: |
          $specName = python scripts/ci_build.py --generate-spec "${{ steps.version.outputs.version }}"
          Push-Location App
          pyinstaller "build/${specName}.spec"
          Pop-Location
          echo "specName=$specName" >> $env:GITHUB_OUTPUT

      - name: Commit version bump and tag
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add App/views/about_view.py
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
          git tag "${{ steps.version.outputs.version }}"
          git push origin main
          git push origin "${{ steps.version.outputs.version }}"

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          body: ${{ env.RELEASE_NOTES }}
          artifacts: "App/dist/${{ steps.build.outputs.specName }}/${{ steps.build.outputs.specName }}.exe"
          token: ${{ secrets.GITHUB_TOKEN }}
